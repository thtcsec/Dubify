<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
    }
    .scene { width: 1080px; height: 1920px; position: relative; overflow: hidden; }
    .background-image { position: absolute; inset: 0; z-index: 0; }
    
    @keyframes sceneKenBurns {
      from { transform: scale(1.02) translate(0, 0); }
      to { transform: scale(1.1) translate(-1.2%, -0.8%); }
    }
    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(48px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .background-image img {
      animation: sceneKenBurns 12s ease-out forwards;
    }
    .video-title-wrapper { animation: titleReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both; }
    .content { animation: cardReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both; }
    .background-image img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      transform: scale(1.06);
    }
    .gradient-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(165deg,
        rgba(15,23,42,0.35) 0%, rgba(30,58,138,0.45) 38%,
        rgba(15,23,42,0.88) 72%, rgba(2,6,23,0.96) 100%);
    }
    .bg-decoration { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.08); }
    .circle-1 { width: 420px; height: 420px; top: -120px; right: -80px; }
    .circle-2 { width: 320px; height: 320px; bottom: 280px; left: -100px; }
    .circle-3 { width: 220px; height: 220px; top: 42%; right: 8%; opacity: 0.45; }
    .page-container {
      position: relative; z-index: 3; width: 1080px; height: 1920px;
      padding: 100px 72px 160px; display: flex; flex-direction: column;
      justify-content: flex-end; gap: 48px;
    }
    .video-title {
      font-size: 80px; font-weight: 800; color: #fff; line-height: 1.15;
      text-shadow: 0 8px 32px rgba(0,0,0,0.55);
    }
    .title-underline {
      width: 160px; height: 6px; margin-top: 28px; border-radius: 3px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
    }
    .content {
      max-width: 936px; width: 100%;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      padding: 64px 56px; border-radius: 28px;
      box-shadow: 0 28px 80px rgba(0,0,0,0.42);
    }
    .text-wrapper { position: relative; }
    .quote-mark {
      position: absolute; font-size: 100px; font-family: Georgia, serif;
      color: rgba(255,255,255,0.22); font-weight: bold; line-height: 1;
    }
    .quote-mark.left { top: -36px; left: -8px; }
    .quote-mark.right { bottom: -56px; right: -8px; }
    .text {
      font-size: 52px; font-weight: 600; color: #f8fafc; line-height: 1.55;
      white-space: pre-line; text-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    .footer { margin-top: 36px; padding-top: 32px; border-top: 2px solid rgba(255,255,255,0.28); }
    .brand { font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.92); letter-spacing: 0.12em; text-transform: uppercase; }
    .brand-sub { font-size: 22px; color: rgba(255,255,255,0.72); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="background-image"><img src="{{IMAGE_URL}}" alt="" /></div>
    <div class="gradient-overlay"></div>
    <div class="bg-decoration">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>
    <div class="page-container">
      {{TITLE_BLOCK}}
      <div class="content">
        <div class="text-wrapper">
          <span class="quote-mark left">"</span>
          <div class="text">{{TEXT}}</div>
          <span class="quote-mark right">"</span>
        </div>
        <div class="footer">
          <div class="brand">Dubify Studio</div>
          <div class="brand-sub">AI Script to Video</div>
        </div>
      </div>
      {{SOCIAL_OVERLAY}}
    </div>
  </div>
</body>
</html>
